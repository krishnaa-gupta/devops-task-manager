services:

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"

  backend:
    image: backend-app
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskdb
    depends_on:
      - mongodb

  frontend:
    image: frontend-app
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
